name: Android Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 调试目录（首次跑建议保留）
      - name: Show Files
        run: |
          pwd
          ls -la

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Prepare Release Files
        run: |
          mkdir -p release

          APK=$(
            find \
              "$GITHUB_WORKSPACE/../build/app/outputs/apk/release" \
              "$GITHUB_WORKSPACE/build/app/outputs/apk/release" \
              -name "*.apk" 2>/dev/null | head -n 1 || true
          )

          echo "Found APK: $APK"

          if [ -z "$APK" ]; then
            echo "No release APK found. Available APK files:"
            find "$GITHUB_WORKSPACE/.." -name "*.apk" -print
            exit 1
          fi

          cp "$APK" \
            "release/chrelyonly_vpn_free-${GITHUB_REF_NAME}.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: release/*.apk

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/**/*.apk
